name: campus-dining

services:
  # ======================== MySQL 数据库 ========================
  mysql:
    image: mysql:8.0
    container_name: campus-dining-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ab123168
      MYSQL_DATABASE: campus_dining
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_general_ci
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./sql/data.sql:/docker-entrypoint-initdb.d/02-data.sql:ro
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pab123168" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - campus-net

  # ======================== 后端服务 ========================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: campus-dining-backend
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/campus_dining?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ab123168
      TZ: Asia/Shanghai
    ports:
      - "8085:8085"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - campus-net

  # ======================== Admin 管理端 ========================
  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    container_name: campus-dining-admin
    restart: unless-stopped
    ports:
      - "8848:80"
    depends_on:
      - backend
    networks:
      - campus-net

  # ======================== 前端用户端 ========================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: campus-dining-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - campus-net

volumes:
  mysql_data:
    driver: local

networks:
  campus-net:
    driver: bridge
